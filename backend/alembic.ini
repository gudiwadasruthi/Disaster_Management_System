[alembic]
# A name for the script directory, relative to this file.
script_location = alembic

# A list of alembic command plugins to load.
# command_plugins =

# Template used to generate migration files.
# file_template = %%(rev)s_%%(slug)s

# The offset for timezone-aware datetime objects
# timezone =

# The output encoding for all files generated by Alembic.
# output_encoding = utf-8

sqlalchemy.url = sqlite:///./disaster.db

[post_write_hooks]
# A list of hooks to run after a migration is generated.
# hooks =
#   black =
#     type = exec
#     entrypoint = black
#     options = -l 79 %(path)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
